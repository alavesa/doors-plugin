name: Doors
version: '0.2.3'
main: fi.alavesa.doors.DoorsPlugin
api-version: '1.21'
description: Facility doors - modeled sliding/blast/vertical doors, keycard readers, lever locks.
softdepend: [Keycards, Labra]
commands:
  doors:
    description: Facility door management
    usage: |
      /doors create <id> <type> <up|down|north|south|east|west> [width] [height]
          (look at the floor block under the doorway's left edge, facing the doorway)
      /doors remove <id>
      /doors open|close|toggle <id>
      /doors bind <id>              (nearest keycard reader within 5 blocks)
      /doors unbind <id>
      /doors bindlock <id> [inverted]   (look at a lever)
      /doors unbindlock <id>
      /doors bindredstone <id>          (look at a block to watch for power)
      /doors list | types | reload
    aliases: [door]
permissions:
  doors.admin:
    description: Manage facility doors
    default: op
